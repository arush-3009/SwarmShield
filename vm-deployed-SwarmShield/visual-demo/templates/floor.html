<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SwarmShield — Dunder Mifflin Network Defense</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #2c2418; }
        canvas { display: block; }
        #controls-hint {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #a09080; font-family: sans-serif; font-size: 11px;
            pointer-events: none; z-index: 10; text-align: center;
            background: rgba(44,36,24,0.8); padding: 6px 16px; border-radius: 12px;
        }
    </style>
</head>
<body>
    <canvas id="floor-canvas"></canvas>
    <div id="controls-hint">SPACE: play/pause &bull; R: restart &bull; +/-: speed &bull; N: step &bull; D: toggle deterministic</div>
    <script src="/static/js/floor.js"></script>
</body>
</html>
